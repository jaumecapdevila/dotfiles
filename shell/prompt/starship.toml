# General config
add_newline = true

# Prompt segments
format = """
$character\
$battery\
$username\
$directory\
$git_branch"""

[character]
success_symbol="[ ✓ ](bold fg:232 bg:226)"
error_symbol="[ ✗ ](bold fg:232 bg:226)"
format="$symbol($style)[\uE0B0](fg:226 bg:28)"

[battery]
full_symbol=""
charging_symbol=""
discharging_symbol=""
format="[$symbol$percentage]($style)[\uE0B0](fg:28 bg:34)"

[[battery.display]]
threshold = 20
style = "bold fg:254 bg:28"

[[battery.display]]
threshold = 60
style = "bold fg:254 bg:28"

[[battery.display]]
threshold = 100
style = "bold fg:254 bg:28"

[username]
show_always=true
style_user="bold fg:232 bg:34"
style_root="bold fg:232 bg:34"
format="[ $user ]($style)[\uE0B0](fg:34 bg:82)"

[directory]
format="[ $path ]($style)[\uE0B0](fg:82) "
truncation_length=2
style="bold fg:232 bg:82"

[git_branch]
format="[\uE0B0](fg:black bg:238)[ $symbol$branch ]($style)[\uE0B0](fg:238) "
style="bold fg:154 bg:238"
