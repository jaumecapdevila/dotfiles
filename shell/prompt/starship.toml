# General config
add_newline = true

# Prompt segments
format = """
$character\
$battery\
$directory\
$git_branch"""

[character]
success_symbol="[ ✔ ](bold fg:232 bg:226)[\uE0B0](fg:226 bg:193)"
error_symbol="[ ✘ ](bold fg:232 bg:196)[\uE0B0](fg:196 bg:193)"
format="$symbol"

[battery]
full_symbol = ""
charging_symbol = ""
discharging_symbol = ""
format="[ $symbol$percentage ]($style)[\uE0B0](fg:193 bg:45)"

[[battery.display]]
threshold = 20
style = "bold fg:0 bg:193"

[[battery.display]]
threshold = 60
style = "bold fg:0 bg:193"

[[battery.display]]
threshold = 100
style = "bold fg:0 bg:193"

[directory]
format="[ $path ]($style)[\uE0B0](fg:45) "
truncation_length=2
style="bold fg:0 bg:45"

[git_branch]
format="[\uE0B0](fg:black bg:238)[ $symbol$branch ]($style)[\uE0B0](fg:238) "
style="bold fg:87 bg:238"
