# General config
add_newline = true

# Prompt segments
format = """
$character\
$battery\
$directory\
$git_branch\
$line_break\
❯ """

[character]
success_symbol="[ ✓ ](fg:254 bg:22)"
error_symbol="[ ✗ ](fg:254 bg:22)"
format="$symbol($style)[\uE0B0](fg:22 bg:28)"

[battery]
full_symbol=""
charging_symbol=""
discharging_symbol=""
format="[ $percentage ]($style)[\uE0B0](fg:28)"

[[battery.display]]
threshold = 20
style = "fg:254 bg:28"

[[battery.display]]
threshold = 60
style = "fg:254 bg:28"

[[battery.display]]
threshold = 100
style = "fg:254 bg:28"

[directory]
format="[\uE0B0](fg:black bg:82)[ $path ]($style)[\uE0B0](fg:82)"
truncation_length=2
style="fg:232 bg:82"

[git_branch]
format="[\uE0B0](fg:black bg:238)[ $symbol$branch ]($style)[\uE0B0](fg:238)"
style="fg:154 bg:238"
