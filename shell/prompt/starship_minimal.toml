# General config
add_newline = true

# Prompt segments
format = """
$directory\
$git_branch\
$character"""

[character]
success_symbol="[ ❯ ](bold fg:red)"
error_symbol="[ ❯ ](bold fg:green)"
format="$symbol($style)"

[directory]
format="[$path]($style)"
truncation_length=2
truncation_symbol=""
style="bold fg:blue"

[git_branch]
format="[ $branch]($style)"
style="bold fg:green"
