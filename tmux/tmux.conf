# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g set-titles-string '#T'

# Enable mouse mode
set -g mouse on

# Setting the prefix from C-b to C-a
set -g prefix C-a

# Setting the delay between prefix and command
set -s escape-time 0

# STAR:clear_history
bind -n C-k clear-history

# Set the base index for windows to 1 instead of 0
set -g base-index 1

# Set the base index for panes to 1 instead of 0
setw -g pane-base-index 1

# Reload the file with Prefix r
bind r source-file ~/.tmux.conf \; display 'Reloaded'

# Toggle broadcast input
bind i setw synchronize-panes \; display 'Toggle panes sync'

# Splitting panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Set the default terminal mode to 256color mode
set -g default-shell /usr/local/bin/zsh
set -g default-terminal 'screen-256color'

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity on

# Move the status line to the top
set -g status on
set -g status-position 'top'

# Enable vi keys
setw -g mode-keys vi

# History limit
set -g history-limit 10000

# Plug-ins configuration
set -g @tmux_power_theme '#a45aac'

# List of plug-ins
set -g @plugin "wfxr/tmux-power"
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-pain-control"
set -g @plugin "tmux-plugins/tmux-copycat"
set -g @plugin "tmux-plugins/tmux-open"
set -g @plugin "tmux-plugins/tmux-cpu"
set -g @plugin "tmux-plugins/tmux-prefix-highlight"

# Everything below this line will override the configuration of the plug-ins
run '~/.tmux/plugins/tpm/tpm'

# Clock mode
setw -g clock-mode-colour green
setw -g clock-mode-style 24

# Active pane
set -g pane-active-border-style "bg=black fg=magenta"
