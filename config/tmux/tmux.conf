# Terminal multiplexer
# https://github.com/tmux/tmux

# sets the default terminal type for tmux sessions
set -g default-terminal "tmux-256color"
# appends (-ag) a terminal override for xterm-256color terminals, enabling RGB color support
set -ag terminal-overrides ",xterm-256color:RGB"

set -g base-index 1          # start indexing windows at 1 instead of 0
set -g detach-on-destroy off # don't exit from tmux when closing a session
set -g escape-time 0         # zero-out escape time delay
set -g history-limit 5000    # increase history size (from 2,000)
set -g mouse on              # enable mouse support
set -g renumber-windows on   # renumber all windows when any window is closed
set -g set-clipboard on      # use system clipboard
set -g status-interval 10     # update the status bar every 3 seconds

# status bar
set -g status-position top        # macOS / darwin style
set -g status-style 'bg=default'  # transparent
set -g status-justify left

set -g status-left "#{?client_prefix,,  #S }#[fg=cyan,bold]#{?client_prefix,  #S ,}"
set -g status-left-length 300 # increase length (from 10)
set -g status-right ""

set -g window-status-format ' #I:#W '
set -g window-status-current-format '#[bg=magenta,fg=#282C34] #I:#W '

set -g allow-passthrough on
set -g message-command-style bg=default,fg=yellow
set -g message-style bg=default,fg=yellow
set -g mode-style bg=default,fg=yellow
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=blue,bg=default'

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# reload config file
unbind r
bind r source-file ~/.tmux.conf

# vim-tmux-navigator
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# bind -N is used to add a descriptive comment or note to a key binding
bind -N "⌘+g lazygit " g new-window -c "#{pane_current_path}" -n "🐙" "lazygit 2> /dev/null"
bind -N "⌘+G gh-dash " G new-window -c "#{pane_current_path}" -n "📊" "ghd 2> /dev/null"

# list of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'christoomey/vim-tmux-navigator'

# tmux-continuum & tmux-resurrecrt
set -g @continuum-restore 'off'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
