# Terminal multiplexer
# https://github.com/tmux/tmux

# set prefix to ctrl+a
set -g prefix C-a

set -g mouse on

# start with window number 1
set -g base-index 1

# Notifying if other windows has activities
setw -g monitor-activity on

# Renumber windows on window close
set -g renumber-windows on

# macOS / darwin style
set -g status-position top

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

unbind r
bind r source-file ~/.tmux.conf

# bind -N is used to add a descriptive comment or note to a key binding
bind -N "‚Ćė+g lazygit " g new-window -c "#{pane_current_path}" -n "ūüźô" "lazygit 2> /dev/null"
bind -N "‚Ćė+G gh-dash " G new-window -c "#{pane_current_path}" -n "ūüďä" "ghd 2> /dev/null"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'jabirali/tmux-tilish'

# Tilish
set -g @tilish-default 'tiled'

# Undercurl
set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# Rose Pine
set -g @rose_pine_variant 'main' # Options are 'main', 'moon' or 'dawn'
set -g @rose_pine_host 'off' # Enables hostname in the status bar
set -g @rose_pine_date_time '' # It accepts the date UNIX command format (man date for info)
set -g @rose_pine_user 'off' # Turn on the username component in the statusbar
set -g @rose_pine_directory 'on' # Turn on the current folder component in the status bar
set -g @rose_pine_bar_bg_disable 'on' # Disables background color, for transparent terminal emulators
set -g @rose_pine_bar_bg_disabled_color_option 'default'

set -g @rose_pine_session_icon 'Ó≠Ņ' # Changes the default icon to the left of the session name
set -g @rose_pine_current_window_icon 'Ó¨£' # Changes the default icon to the left of the active window name
set -g @rose_pine_folder_icon 'Ôźď' # Changes the default icon to the left of the current directory folder
set -g @rose_pine_username_icon 'ÔÄá' # Changes the default icon to the right of the hostname
set -g @rose_pine_hostname_icon 'ůįíč' # Changes the default icon to the right of the hostname
set -g @rose_pine_date_time_icon 'ůįÉį' # Changes the default icon to the right of the date module
set -g @rose_pine_window_status_separator " Ó≠į " # Changes the default icon that appears between window names

# tmux-continuum & tmux-resurrecrt
set -g @continuum-restore 'off'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
