#################################### PLUGINS ###################################

set -g @mode_indicator_prefix_prompt "WAIT"
set -g @mode_indicator_prefix_mode_style fg=blue,bold
set -g @mode_indicator_copy_prompt "COPY"
set -g @mode_indicator_copy_mode_style fg=green,bold
set -g @mode_indicator_sync_prompt "SYNC"
set -g @mode_indicator_sync_mode_style fg=red,bold
set -g @mode_indicator_empty_prompt "TMUX"
set -g @mode_indicator_empty_mode_style fg=magenta,bold

# tmux-online-status
set -g @route_to_ping "google.com"
set -g @online_icon " "
set -g @offline_icon "#[fg=red]󱚼 "

# tmux-pomodoro
set -g @pomodoro_on "  #[fg=$color_fg] "
set -g @pomodoro_complete "  #[fg=green] "

# tmux-battery
set -g @batt_icon_charge_tier8 " "
set -g @batt_icon_charge_tier7 " "
set -g @batt_icon_charge_tier6 " "
set -g @batt_icon_charge_tier5 " "
set -g @batt_icon_charge_tier4 " "
set -g @batt_icon_charge_tier3 " "
set -g @batt_icon_charge_tier2 " "
set -g @batt_icon_charge_tier1 " "

set -g @batt_icon_status_charged " "
set -g @batt_icon_status_charging "󰂄"
set -g @batt_icon_status_discharging " "
set -g @batt_icon_status_attached " "
set -g @batt_icon_status_unknown " "

set -g @batt_remain_short true

#################################### OPTIONS ###################################

set -g status on
set -g status-justify centre
set -g status-position top
set -g status-style "fg=$color_fg,bg=$color_bg"

set -g pane-active-border fg=blue
set -g pane-border-style fg=$color_border

set -g message-style bg=blue,fg=$color_bg
setw -g window-status-separator "  "
set-window-option -g mode-style bg=magenta,fg=$color_bg

#################################### FORMAT ####################################

set -g status-left " #{tmux_mode_indicator} "
set -g status-right " #{pomodoro_status} #{online_status} #{battery_icon_charge} #{battery_percentage} #{battery_icon_status} "
setw -g window-status-current-format '#[fg=magenta]#W'
setw -g window-status-format '#W'
