set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

set -g status-position top       # macOS / darwin style
set -g status-style 'bg=default' # transparent
set -g message-style 'fg=black bg=yellow bold'

set -g status-left "#[fg=blue,bold]  #S "
set -g status-left-length 300

set -g status-right ""
set -g status-right-length 10

set -g pane-active-border-style 'fg=blue,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set -g window-style 'fg=white,bg=default'
set -g window-active-style 'fg=blue,bg=default'

setw -g window-status-style "fg=gray,bg=default,bold"
setw -g window-status-format ' #I  #W '

setw -g window-status-current-style "fg=magenta,bg=default,bold"
setw -g window-status-current-format ' #I  #W '

setw -g clock-mode-colour blue
setw -g mode-style 'fg=black bg=yellow bold' # copy mode
