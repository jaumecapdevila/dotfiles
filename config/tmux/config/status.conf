set -g status-position top       # macOS / darwin style
set -g status-style 'bg=default' # transparent

set -g status-left "#[fg=blue,bold]  #S "
# set -g status-left "#[fg=blue,bold]#S #[fg=white,nobold]#(gitmux -cfg $HOME/.config/tmux/gitmux.yml) "
set -g status-right ""
set -g status-left-length 300

set -g window-status-format '#[fg=gray,bg=default,bold] #I   #W'
set -g window-status-current-format '#[fg=magenta,bg=default,bold] #I   #W'

set -g allow-passthrough on
set -g message-command-style bg=default,fg=yellow
set -g message-style bg=default,fg=yellow
set -g mode-style bg=default,fg=yellow
set -g pane-active-border-style 'fg=white,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
