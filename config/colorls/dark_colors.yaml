day_old: "#455574" # Gray
no_modifier: "#93a4c3" # Fg

# File Size
file_large: "#f65866" # Red
file_medium: "#dd9046" # Orange
file_small: "#8bcd5b" # Green

# Random
report: "#8bcd5b" # Green
user: "#34bfd0" # Cyan
tree: "#c75ae8" # Magenta
empty: "#455574" # Gray
