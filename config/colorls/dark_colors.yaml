# A Ruby gem that beautifies the terminal's ls command, with color and font-awesome icons.
# Repo: https://github.com/athityakumar/colorls

# Main Colors
unrecognized_file: "#ffeb95" # Yellow
recognized_file: "#d6deeb" # Text
executable_file: "#7fdbca" # Cyan
dir: "#82aaff" # Blue

# Link
dead_link: "#ef5350" # Red
link: "#7fdbca" # Cyan

# Special Files
socket: "#addb67" # Green
blockdev: "#addb67" # Green
chardev: "#addb67" # Green

# Access Modes
write: "#F78C6C" # Orange
read: "#c792ea" # Magenta
exec: "#addb67" # Foam
no_access: "#ef5350" # Red

# Age
hour_old: "#637777" # Comment
day_old: "#575656" # Black
no_modifier: "#d6deeb" # Text

# File Size
file_large: "#ef5350" # Red
file_medium: "#ffeb95" # Yellow
file_small: "#F78C6C" # Orange

# Random
report: "#F78C6C" # Orange
user: "#7fdbca" # Cyan
tree: "#4b6479" # Current Line
empty: "#637777" # Comment
error: "#ef5350" # Red
normal: "#d6deeb" # Text

# Git
addition: "#7fdbca" # Cyan
modification: "#c792ea" # Magenta
deletion: "#ef5350" # Red
untracked: "#ffeb95" # Yellow
unchanged: "#addb67" # Green
