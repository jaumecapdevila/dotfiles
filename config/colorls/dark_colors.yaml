# https://github.com/navarasu/onedark.nvim/blob/master/lua/onedark/palette.lua
# Main Colors
unrecognized_file: "#dd9046" # Orange
recognized_file: "#93a4c3" # Fg
executable_file: "#8bcd5b" # Green
dir: "#41a7fc" # Blue

# Link
dead_link: "#f65866" # Red
link: "#34bfd0" # Cyan

# Special Files
socket: "#8bcd5b" # Green
blockdev: "#8bcd5b" # Green
chardev: "#8bcd5b" # Green

# Access Modes
write: "#8bcd5b" # Green
read: "#c75ae8" # Magenta
exec: "#34bfd0" # Cyan
