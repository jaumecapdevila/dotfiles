normal: "#93a4c3" # Fg

# Git
addition: "#34bfd0" # Cyan
modification: "#efbd5d" # Yellow
deletion: "#f65866" # Red
untracked: "#dd9046" # Orange
unchanged: "#8bcd5b" # Green
