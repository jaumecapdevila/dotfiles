# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

# get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'


# inserts blank line between shell prompts
add_newline = true

# sets which color palette from palettes to use
palette = "onedark"

# configure the format of the prompt
format = """
$character\
$directory\
$git_branch\
$nodejs\
$lua\
$cmd_duration"""

[directory]
format = "[$path]($style) "
home_symbol = "~"
read_only = " 󰌾"
read_only_style = "bold red"
style = "bold blue"
truncate_to_repo = true
truncation_length = 2
truncation_symbol = "…/"

[git_branch]
disabled = false
format = "[$symbol$branch]($style) "
style = "bold cyan"
symbol = "󰘬 "
truncation_length = 20
truncation_symbol = "…"

[cmd_duration]
format = '[$duration]($style) '
min_time = 2000
style = "bold yellow"

[python]
disabled = false
python_binary = "python3"
style = "bold yellow"
symbol = "󱔎"

[nodejs]
disabled = false
format = "[$symbol($version )]($style)"
style = "bold green"
symbol = "󰚩 "

[lua]
disabled = false
format = "[$symbol($version )]($style)"
style = "bold blue"
symbol = "󰽢 "

[character]
disabled = false
error_symbol = '[󰳟](red) '
success_symbol = '[󰳟](accent) '

# Define custom colors
[palettes.onedark]
accent = "#528bff"
