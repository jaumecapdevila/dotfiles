# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

command_timeout = 1000

# Change the default prompt format
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$cmd_duration\
$character"""

[directory]
style = "bold blue"

[git_branch]
format = "[$branch]($style) "
style = "brigth-black"
truncation_length = 10
truncation_symbol = "…/"

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = "bold cyan"
staged = " ${count} "
conflicted = " "
up_to_date = " "
untracked = " "
ahead = "⇡${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
behind = "⇣${count} "
stashed = " "
modified = " "
renamed = "󰀉 "
deleted = " "

[python]
format = ' [󱚝 $version](bold green) '

[nodejs]
format = ' [󱚝 $version](bold green) '

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[character]
success_symbol = "[](white) "
error_symbol = "[](red) "
vicmd_symbol = "[](green) "
