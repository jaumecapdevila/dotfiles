# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

command_timeout = 1000
add_newline = false

# update default format
format = """
$directory\
$git_branch\
$cmd_duration\
$status"""

[line_break]
disabled = true

[directory]
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "🏠"
read_only_style = "197"
read_only = "🔒"
style = "bold blue"
format = "at [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "🐙 "
format = "on [$symbol$branch]($style) "
truncation_length = 10
truncation_symbol = "…/"
style = "bold cyan"

[cmd_duration]
min_time = 5000
format = '[$duration](bold yellow) '

[status]
symbol = '😡'
success_symbol = '🚀'
format = '[$symbol$common_meaning]($style) '
disabled = false

[python]
symbol = "🐍"
python_binary = "python3"

[nodejs]
symbol = "🤖"
