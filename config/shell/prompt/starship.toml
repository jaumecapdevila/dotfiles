# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

command_timeout = 1000
add_newline = true

# update default format
format = """
$directory\
$git_branch\
$cmd_duration\
$status\
$character"""

right_format = """
$shell\
$python\
$nodejs\
$time"""

[line_break]
disabled = true

[shell]
zsh_indicator='zsh'
fish_indicator = 'fish'
nu_indicator='nu'
unknown_indicator = '?'
style = 'cyan bold'
disabled = false

[character]
success_symbol = '[➜](bold purple)'
error_symbol = '[➜](bold red)'
disabled = false

[username]
style_user = "white bold"
style_root = "black bold"
format = "[$user]($style) "
show_always = false

[directory]
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "🏠"
read_only_style = "197"
read_only = "🔒"
style = "bold blue"
format = "at [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "🐙 "
format = "on [$symbol$branch]($style) "
truncation_length = 10
truncation_symbol = "…/"
style = "bold cyan"

[cmd_duration]
min_time = 5000
format = '[$duration](bold yellow) '

[status]
symbol = '😡'
success_symbol = '🚀'
format = '[$symbol$common_meaning]($style) '
disabled = false

[python]
symbol = "🐍"
python_binary = "python3"

[nodejs]
symbol = "🤖"
