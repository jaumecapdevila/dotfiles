# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

command_timeout = 1000
add_newline = true

# change the default format
format = """
$directory\
$git_branch\
$nodejs\
$lua\
$cmd_duration\
$line_break\
$character"""

[line_break]
disabled = true

[directory]
format = "[󰉋 $path]($style) "
home_symbol = "~"
read_only = " 󰌾"
read_only_style = "bold white"
style = "bold blue"
truncate_to_repo = true
truncation_length = 2
truncation_symbol = "…/"

[git_branch]
disabled = false
format = "[$symbol$branch]($style) "
style = "bold cyan"
symbol = "󰊤 "
truncation_length = 10
truncation_symbol = "…/"

[cmd_duration]
format = '[$duration]($style) '
min_time = 2000
style = "bold yellow"

[python]
disabled = false
python_binary = "python3"
style = "bold yellow"
symbol = "󱔎"

[nodejs]
disabled = false
format = "[$symbol($version )]($style)"
style = "bold bg:green fg:black"
symbol = "󰚩 "

[lua]
disabled = false
format = "[$symbol($version )]($style)"
style = "bold blue"
symbol = "󰽢 "

[character]
disabled = false
error_symbol = '[󰳟](red)'
success_symbol = '[󰳟](purple)'
