# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

command_timeout = 1000
add_newline = true

# update default format
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$lua\
$cmd_duration\
$status\
$line_break\
$character"""

[line_break]
disabled = false

[directory]
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "~"
read_only_style = "197"
read_only = "🔒"
style = "bold blue"
format = "📁 [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "🐙 "
format = "[$symbol$branch]($style) "
truncation_length = 10
truncation_symbol = "…/"
style = "bold cyan"

[git_status]
disabled = true
format = "([$all_status$ahead_behind]($style) )"
conflicted = ''
ahead = ''
behind = '😰'
diverged = '😵'
up_to_date = ''
untracked = '🤔'
stashed = '📦'
modified = '📝'
staged = ''
renamed = ''
deleted = '🔥'

[cmd_duration]
min_time = 2000
format = '[$duration](bold yellow) '

[status]
disabled = true
symbol = '😡'
success_symbol = '🚀'
format = '[$symbol]($style) '

[python]
symbol = "🐍"
python_binary = "python3"

[nodejs]
symbol = "🤖 "
format = "[$symbol($version )]($style)"

[lua]
symbol = "🌑 "
format = "[$symbol($version )]($style)"

[character]
success_symbol = '[➜](purple)'
error_symbol = '[➜](red)'

