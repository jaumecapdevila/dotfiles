# The minimal, blazing-fast, and infinitely customizable prompt
# Repo: https://starship.rs

# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"

# Inserts blank line between shell prompts
add_newline = true
command_timeout = 3000

# Configure the left prompt
format = """
$os\
[](bg:violet fg:yellow)\
$shell\
[](bg:white fg:violet)\
$time\
[](bg:blue fg:white)\
$directory\
[](bg:aqua fg:blue)\
$git_branch\
[](bg:none fg:aqua) \
"""

# Display language versions on the right prompt
right_format = """
$lua\
$nodejs\
$python\
"""

palette = "solarized"

[palettes.solarized]
aqua = "#2aa198"
base = "#002b36"
blue = "#268bd2"
green = "#859900"
orange = "#cb4b16"
purple = "#d33682"
violet = "#6c71c4"
white = "#ece8d6"
yellow = "#b58900"

[os]
disabled = false
format = "[ $symbol ]($style)"
style = "bg:yellow fg:base"

[os.symbols]
Macos = "󰀵"

[shell]
disabled = false
fish_indicator = "󰈺 "
powershell_indicator = "󰨊 "
zsh_indicator = "zsh 󱓞"
unknown_indicator = "mystery shell"
format = "[ $indicator ]($style)"
style = "bg:violet fg:base"

[time]
disabled = false
format = "[ 󱑁 $time ]($style)"
style = "bg:white fg:base"

[directory]
format = "[ 󰉋 $path ]($style)"
style = "bg:blue fg:base"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
format = "[ $symbol $branch ]($style)"
style = "bg:aqua fg:base"
symbol = ""
truncation_length = 20

# Languages

[golang]
style = "bg:overlay fg:aqua"
format = "[$symbol$version]($style) "
disabled = false
symbol = " "

[nodejs]
style = "bg:overlay fg:aqua"
format = "[$symbol$version]($style) "
disabled = true
symbol = "󰚩 "

[rust]
style = "bg:overlay fg:aqua"
format = "[$symbol$version]($style) "
disabled = false
symbol = "󱘗 "

[python]
style = "bg:overlay fg:aqua"
format = "[$symbol$version]($style) "
disabled = false
symbol = " "

[conda]
style = "bg:overlay fg:aqua"
format = "[$symbol$environment]($style) "
disabled = false
symbol = "🅒 "
