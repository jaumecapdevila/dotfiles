# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"

# Inserts blank line between shell prompts
add_newline = true
command_timeout = 3000

# Left prompt
format = """
$directory\
$line_break\
$character"""

# Right prompt
right_format="""
$cmd_duration\
$git_branch\
$lua\
$nodejs\
$python\
"""

[directory]
format = "[ $path]($style) "
home_symbol = "~"
read_only = " 󰌾"
read_only_style = "bold red"
style = "bold blue"
truncate_to_repo = true
truncation_length = 2
truncation_symbol = '…/'

[git_branch]
disabled = false
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold cyan"
symbol = "󰘬 "
truncation_length = 20
truncation_symbol = "…"

[lua]
disabled = false
format = "[$symbol($version )]($style)"
style = "bold blue"
symbol = "󰽢 "

[nodejs]
disabled = false
format = "[$symbol($version )]($style)"
style = "bold green"
symbol = "󰚩 "

[python]
disabled = false
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
python_binary = "python3"
style = "bold yellow"
symbol = "󱔎 "

[cmd_duration]
format = '[$duration]($style) '
min_time = 2000
style = "bold yellow"

[line_break]
disabled = true

[character]
disabled = false
success_symbol = "[](purple)"
error_symbol = "[](red)"
vimcmd_symbol = "[](green)"
