# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

# Get editor completions based on the config schema
'$schema' = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 3000

format = """
$cmd_duration\
$directory\
$git_branch\
$character\
"""

[directory]
format = "[$path]($style) "
style = "blue bold"
truncate_to_repo = true
truncation_length = 2
truncation_symbol = ''

[git_branch]
disabled = false
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'cyan bold'
symbol = " "
truncation_length = 20
truncation_symbol = '…'

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[character]
disabled = false
success_symbol = "[](purple)"
error_symbol = "[](red)"
vimcmd_symbol = "[](green)"
