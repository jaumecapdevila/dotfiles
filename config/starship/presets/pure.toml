format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
format = "[яДФ $path]($style) "
style = "blue bold"

[character]
disabled = false
success_symbol = "[яБФ](purple)"
error_symbol = "[яБФ](red)"
vimcmd_symbol = "[яБУ](green)"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bright-black"
symbol = "яВЫ "
truncation_length = 20
truncation_symbol = "тАж"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](bright-cyan) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "тАЛ"
untracked = "тАЛ"
modified = "тАЛ"
staged = "тАЛ"
renamed = "тАЛ"
deleted = "тАЛ"
stashed = "тЙб"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
